<!DOCTYPE html>
<html>
<head>
    <title>注册</title>
</head>
<body>
    <h2>注册</h2>
    <input id="username" placeholder="用户名">
    <input id="password" type="password" placeholder="密码">
    <input id="confirm" type="password" placeholder="确认密码">
    <button id="regBtn">注册</button>
    <div id="msg"></div>

    <script>
        document.getElementById('regBtn').onclick = () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            if (!username || !password) {
                alert('用户名和密码不能为空');
                return;
            }
            if (password !== confirm) {
                alert('两次密码不一致');
                return;
            }
            window.location.href = `/auth/register?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`;
        };
        const urlParams = new URLSearchParams(window.location.search);
        const result = urlParams.get('result');
        if (result === 'success') {
            document.getElementById('msg').innerText = '注册成功！即将跳转登录...';
            setTimeout(() => location.href = '/login.html', 2000);
        } else if (result === 'github_already_used') {
            document.getElementById('msg').innerText = '该GitHub账号已绑定其他用户';
        } else if (result === 'username_exists') {
            document.getElementById('msg').innerText = '用户名已被占用';
        } else if (result === 'error') {
            document.getElementById('msg').innerText = '注册失败，请重试';
        }
    </script>
</body>
</html>
