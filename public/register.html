<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>注册 - 魔法世界入口</title>
    <link rel="stylesheet" href="/common.css">
    <style>
        /* 针对注册页面的额外样式 */
        .register-container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            text-align: center;
        }
        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }
        button {
            background-color: #2c3e50;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #1a252f;
        }
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }
        .error-message {
            color: #e74c3c;
            margin-top: 15px;
            font-size: 14px;
        }
        .info-message {
            color: #3498db;
            margin-top: 15px;
            font-size: 14px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #fff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        a {
            color: #3498db;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="register-container">
            <h1>🔐 创建魔法账号</h1>
            <form id="registerForm">
                <div>
                    <input type="text" id="username" name="username" placeholder="用户名" required>
                </div>
                <div>
                    <input type="password" id="password" name="password" placeholder="密码" required>
                </div>
                <button type="submit" id="registerBtn">使用 GitHub 注册</button>
                <div id="messageArea"></div>
            </form>
            <p>已有账号？ <a href="/login.html">立即登录</a></p>
        </div>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const registerBtn = document.getElementById('registerBtn');
        const messageArea = document.getElementById('messageArea');

        registerForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showMessage('请输入用户名和密码', 'error');
                return;
            }

            // 禁用按钮，显示加载状态
            registerBtn.disabled = true;
            registerBtn.innerHTML = '<span class="loading"></span> 跳转中...';

            try {
                const response = await fetch('/api/auth/github', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        action: 'register'
                    })
                });

                // 注意：正常情况下 /api/auth/github 应该返回 302 重定向，浏览器会自动跟随
                // 如果返回的不是 302，说明后端出错了，我们需要处理错误信息
                if (response.redirected) {
                    // 如果是重定向，说明成功，浏览器会自动跳转，这里不需要额外处理
                    return;
                } else if (!response.ok) {
                    // 如果请求失败，解析 JSON 错误信息并显示
                    const errorData = await response.json().catch(() => ({ error: '请求失败，请重试' }));
                    showMessage(errorData.error || `注册失败 (${response.status})`, 'error');
                } else {
                    // 理论上不应该走到这里，但以防万一
                    showMessage('未知响应，请稍后重试', 'error');
                }
            } catch (err) {
                console.error('注册请求异常:', err);
                showMessage('网络异常，请检查连接后重试', 'error');
            } finally {
                // 恢复按钮状态
                registerBtn.disabled = false;
                registerBtn.innerHTML = '使用 GitHub 注册';
            }
        });

        // 显示消息的辅助函数
        function showMessage(msg, type) {
            messageArea.innerHTML = `<div class="${type === 'error' ? 'error-message' : 'info-message'}">${msg}</div>`;
            // 3秒后自动清除错误信息
            setTimeout(() => {
                if (messageArea.innerHTML.includes(msg)) {
                    messageArea.innerHTML = '';
                }
            }, 5000);
        }

        // 从 URL 参数中获取错误信息并显示
        const urlParams = new URLSearchParams(window.location.search);
        const errorParam = urlParams.get('error');
        if (errorParam) {
            let errorMsg = decodeURIComponent(errorParam);
            // 将常见的错误码转换成更友好的提示
            if (errorMsg === 'missing_code') {
                errorMsg = '授权过程中缺少必要参数，请重试。';
            } else if (errorMsg === 'registration_failed') {
                errorMsg = '注册失败，请确保用户名未被使用，密码符合要求。';
            }
            showMessage(errorMsg, 'error');
        }
    </script>
</body>
</html>
