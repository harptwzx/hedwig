<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 · Hedwig</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .register-card {
            max-width: 450px;
            margin: 3rem auto;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #cbd5e6;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 1rem;
        }
        .error-msg {
            background: #7f1a1a;
            color: #fecaca;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }
        .success-msg {
            background: #1a4731;
            color: #86efac;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }
        .github-btn {
            background: #24292e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 1rem;
        }
        .github-btn:hover {
            background: #2c3136;
        }
        .login-link {
            margin-top: 1.5rem;
            color: #94a3b8;
        }
        .login-link a {
            color: #fbbf24;
            text-decoration: none;
        }
        .divider {
            margin: 1.5rem 0;
            position: relative;
            text-align: center;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #334155;
        }
        .divider span {
            position: relative;
            background: #0f172a;
            padding: 0 0.75rem;
            color: #94a3b8;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="container">
        <div class="register-card card">
            <h2>注册账号</h2>
            
            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>
            
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名（用于登录）">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码（至少6位）">
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" id="confirmPassword" placeholder="请再次输入密码">
            </div>
            
            <div class="divider">
                <span>验证方式</span>
            </div>
            
            <button class="github-btn" id="githubRegisterBtn">
                <svg height="20" viewBox="0 0 16 16" width="20" style="fill:white;">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                </svg>
                使用 GitHub 验证并注册
            </button>
            
            <div class="login-link">
                已有账号？ <a href="/login.html">立即登录</a>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script>
        const registerBtn = document.getElementById('githubRegisterBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        
        registerBtn.addEventListener('click', () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            
            if (!username || !password) {
                errorMsg.textContent = '用户名和密码不能为空';
                errorMsg.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorMsg.textContent = '密码长度不能少于6位';
                errorMsg.style.display = 'block';
                return;
            }
            
            if (password !== confirmPassword) {
                errorMsg.textContent = '两次输入的密码不一致';
                errorMsg.style.display = 'block';
                return;
            }
            
            // 跳转到注册入口，传递用户名和密码
            window.location.href = `/auth/register?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`;
        });
        
        // 检查 URL 参数
        const urlParams = new URLSearchParams(window.location.search);
        const result = urlParams.get('result');
        
        if (result === 'success') {
            successMsg.textContent = '注册成功！正在跳转登录页...';
            successMsg.style.display = 'block';
            setTimeout(() => {
                window.location.href = '/login.html';
            }, 2000);
        } else if (result === 'github_already_used') {
            errorMsg.textContent = '该 GitHub 账号已绑定其他用户，不能重复注册';
            errorMsg.style.display = 'block';
        } else if (result === 'username_exists') {
            errorMsg.textContent = '用户名已被占用，请换一个';
            errorMsg.style.display = 'block';
        } else if (result === 'error') {
            errorMsg.textContent = '注册失败，请重试';
            errorMsg.style.display = 'block';
        }
    </script>
</body>
</html>
