<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hedwig · 首页</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .welcome { text-align: center; margin: 50px; }
        .card { background: #1e293b; padding: 20px; border-radius: 10px; margin: 20px; text-align: center; }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>
    <div class="container">
        <div class="welcome">
            <h1>🦉 Hedwig</h1>
            <p>魔法世界入口</p>
            <span id="user-badge"></span>
        </div>
        <div class="card">
            <h3>公共区域</h3>
            <p>所有人都能看到的内容</p>
        </div>
        <div id="userArea" style="display:none" class="card">
            <h3>✨ 魔法师专属区域</h3>
            <p id="welcomeMsg"></p>
        </div>
        <div id="guestArea" style="display:none" class="card">
            <p>👋 欢迎来到 Hedwig 魔法世界</p>
            <a href="/login.html">登录</a> | <a href="/register.html">注册</a>
        </div>
    </div>
    <script src="/js/common.js"></script>
    <script>
        Hedwig.initPage().then(() => {
            const userBadge = document.getElementById('user-badge');
            if (Hedwig.isLoggedIn()) {
                const user = Hedwig.getUser();
                userBadge.textContent = `已登录: ${user.username}`;
                document.getElementById('userArea').style.display = 'block';
                document.getElementById('guestArea').style.display = 'none';
                document.getElementById('welcomeMsg').innerHTML = `欢迎回来，${user.username}！`;
            } else {
                userBadge.textContent = '未登录';
                document.getElementById('userArea').style.display = 'none';
                document.getElementById('guestArea').style.display = 'block';
            }
        });
    </script>
</body>
</html>
