<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hedwig - 魔法世界入口</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <div class="nav-container">
                <a href="/" class="logo">Hedwig</a>
                <div class="nav-links" id="navLinks"></div>
            </div>
        </nav>
        <main class="container">
            <div class="hero">
                <h1>欢迎来到 Hedwig</h1>
                <p>魔法世界入口，你的专属空间</p>
                <div id="authButtons" class="auth-buttons"></div>
            </div>
            <div class="features">
                <div class="feature-card">
                    <h3>魔法日记</h3>
                    <p>记录你的魔法时刻</p>
                </div>
                <div class="feature-card">
                    <h3>魔法书库</h3>
                    <p>收藏你的知识宝藏</p>
                </div>
                <div class="feature-card">
                    <h3>咒语集</h3>
                    <p>收集强大的魔法咒语</p>
                </div>
            </div>
        </main>
    </div>
    <script src="/js/app.js"></script>
</body>
</html>
