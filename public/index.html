<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hedwig · 首页</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .welcome {
            margin-bottom: 2rem;
        }
        .welcome h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .protected-area {
            background: #1e293b;
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-top: 1rem;
            border-left: 3px solid #fbbf24;
        }
        .protected-area h3 {
            margin-bottom: 0.5rem;
            color: #fbbf24;
        }
        .user-only-content {
            display: none;
        }
        .guest-only-content {
            display: none;
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>
    
    <div class="container">
        <div class="welcome">
            <h1>Hedwig</h1>
            <p>魔法世界入口</p>
            <span id="user-badge" class="badge"></span>
        </div>
        
        <div class="card">
            <h3>公共区域</h3>
            <p>所有人都能看到的内容。</p>
        </div>
        
        <div id="userOnlyArea" class="user-only-content">
            <div class="protected-area">
                <h3>魔法师专属区域</h3>
                <p>只有登录用户才能看到这个区域。</p>
                <div style="margin-top: 1rem;">
                    <label>你的魔法笔记：</label>
                    <textarea rows="3" placeholder="写点东西..."></textarea>
                    <button>保存笔记</button>
                </div>
            </div>
        </div>
        
        <div id="guestOnlyArea" class="guest-only-content">
            <div class="card" style="text-align: center;">
                <p>你是访客模式。</p>
                <a href="/login.html" class="btn-login" style="display: inline-block; margin-top: 0.5rem;">登录解锁更多功能</a>
            </div>
        </div>
        
        <div id="featureArea"></div>
    </div>

    <script src="/js/common.js"></script>
    <script>
        Hedwig.initPage().then(() => {
            if (Hedwig.isLoggedIn()) {
                document.getElementById('userOnlyArea').style.display = 'block';
                document.getElementById('guestOnlyArea').style.display = 'none';
            } else {
                document.getElementById('userOnlyArea').style.display = 'none';
                document.getElementById('guestOnlyArea').style.display = 'block';
            }
            
            Hedwig.showGuestMessage('featureArea', '访客模式下无法使用此功能，请登录');
        });
    </script>
</body>
</html>
