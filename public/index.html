<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hedwig</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <div class="logo"><a href="/"> Hedwig</a></div>
        <div id="navLinks">
            <a href="/login.html">登录</a>
            <a href="/register.html">注册</a>
        </div>
    </nav>

    <main>
        <div class="hero">
            <div class="hero-icon"></div>
            <h1>Hedwig</h1>
            <p>一个简单、安全的空间</p>
        </div>

        <div id="authButtons">
            <a href="/auth/login" class="btn-github">
                <svg height="20" viewBox="0 0 16 16" width="20" style="vertical-align: middle; margin-right: 8px; fill: currentColor;">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
                </svg>
                使用 GitHub 登录
            </a>
            <a href="/register.html" class="btn-secondary">注册账号</a>
        </div>

        <div class="message-board">
            <h2>留言板(有bug)</h2>
            <p class="board-desc">留下你的想法，与大家交流</p>

            <form id="messageForm" class="message-form">
                <div class="form-group">
                    <input type="text" id="msgName" placeholder="你的名字（可选）" maxlength="30">
                </div>
                <div class="form-group">
                    <textarea id="msgContent" placeholder="写下你的留言..." rows="3" required maxlength="500"></textarea>
                </div>
                <button type="submit" class="btn-primary">发送留言</button>
            </form>

            <div id="messageList" class="message-list">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </main>

    <footer>
        <p>Hedwig - 一个简单的空间(未完成)</p>
        <p>加微信？可搜索H7Grfdharpt0406</p>
    </footer>

    <script src="/js/app.js"></script>
</body>
</html>
