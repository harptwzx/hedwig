<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hedwig</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <div class="logo"><a href="/">Hedwig</a></div>
        <div id="navLinks">
            <a href="/login.html">登录</a>
            <a href="/register.html">注册</a>
        </div>
    </nav>

    <main>
        <div class="hero-section">
            <h1>Hedwig</h1>
            <p class="subtitle">一个简单、安全的空间</p>
            <div id="authButtons">
                <a href="/login.html" class="btn-primary">登录</a>
                <a href="/register.html" class="btn-primary">注册</a>
            </div>
        </div>

        <div class="message-board golden-board" id="messageBoard">
            <div class="board-header">
                <div class="board-title-wrap">
                    <h2>留言板</h2>
                    <p class="board-desc">留下你的想法，与大家交流</p>
                </div>
                <button id="toggleBoardBtn" class="btn-toggle" title="展开/收起">
                    <svg id="toggleIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </button>
            </div>

            <div id="boardContent" class="board-content collapsed">
                <form id="messageForm" class="message-form">
                    <div class="form-group">
                        <input type="text" id="msgName" placeholder="你的名字（可选）" maxlength="30">
                    </div>
                    <div class="form-group">
                        <textarea id="msgContent" rows="4" placeholder="写下你的留言..." maxlength="500" required></textarea>
                    </div>
                    <button type="submit" class="btn-primary">发送留言</button>
                </form>

                <div id="messageList" class="message-list">
                    <div class="loading">加载中...</div>
                </div>

                <div id="pagination" class="pagination" style="display:none;">
                    <button id="prevPage" class="btn-page">上一页</button>
                    <span id="pageInfo"></span>
                    <button id="nextPage" class="btn-page">下一页</button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <p>Hedwig</p>
        <p>加微信？搜索H7Grfdharpt0406</p>
    </footer>

    <script src="/js/app.js"></script>
</body>
</html>
