<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hedwig</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <div class="logo">🦉 Hedwig</div>
        <div id="navLinks"></div>
    </nav>

    <main>
        <div class="hero">
            <div class="hero-icon">🦉</div>
            <h1>Hedwig</h1>
            <p>一个简单、安全的空间</p>
        </div>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">📓</div>
                <h3>日记</h3>
                <p>记录你的生活点滴</p>
            </div>
            <div class="feature">
                <div class="feature-icon">📚</div>
                <h3>书库</h3>
                <p>收藏你的知识宝藏</p>
            </div>
            <div class="feature">
                <div class="feature-icon">⭐</div>
                <h3>收藏</h3>
                <p>收集喜欢的事物</p>
            </div>
        </div>

        <div id="authButtons"></div>

        <section class="message-board">
            <h2>✨ 留言板</h2>
            <p class="board-desc">留下你的想法，与大家交流</p>

            <form id="messageForm" class="message-form">
                <div class="form-group">
                    <input type="text" id="msgName" placeholder="你的名字（可选）" maxlength="30">
                </div>
                <div class="form-group">
                    <textarea id="msgContent" placeholder="写下你的留言..." rows="3" maxlength="500" required></textarea>
                </div>
                <button type="submit" class="btn-primary">发送留言</button>
            </form>

            <div id="messageList" class="message-list"></div>
        </section>
    </main>

    <footer>
        <p>🦉 Hedwig · 用 ❤️ 构建</p>
    </footer>

    <script src="/js/app.js"></script>
</body>
</html>
