<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · Hedwig</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .login-card {
            max-width: 400px;
            margin: 3rem auto;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #cbd5e6;
        }
        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 1rem;
        }
        .login-btn {
            background: #fbbf24;
            color: #0f172a;
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .github-login {
            background: #24292e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            margin-top: 1rem;
        }
        .error-msg {
            background: #7f1a1a;
            color: #fecaca;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }
        .register-link {
            margin-top: 1.5rem;
            color: #94a3b8;
        }
        .register-link a {
            color: #fbbf24;
            text-decoration: none;
        }
        .divider {
            margin: 1.5rem 0;
            position: relative;
            text-align: center;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #334155;
        }
        .divider span {
            position: relative;
            background: #0f172a;
            padding: 0 0.75rem;
            color: #94a3b8;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="container">
        <div class="login-card card">
            <h2>登录 Hedwig</h2>
            
            <div id="errorMsg" class="error-msg"></div>
            
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="password" placeholder="请输入密码">
            </div>
            
            <button class="login-btn" id="loginBtn">登录</button>
            
            <div class="divider">
                <span>或者</span>
            </div>
            
            <a href="/auth/github/login" class="github-login">
                <svg height="20" viewBox="0 0 16 16" width="20" style="fill:white;">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                </svg>
                使用 GitHub 登录
            </a>
            
            <div class="register-link">
                还没有账号？ <a href="/register.html">立即注册</a>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script>
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');
        
        Hedwig.initPage().then(() => {
            if (Hedwig.isLoggedIn()) {
                window.location.href = '/';
            }
        });
        
        loginBtn.addEventListener('click', async () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            errorMsg.style.display = 'none';
            
            if (!username || !password) {
                errorMsg.textContent = '用户名和密码不能为空';
                errorMsg.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('auth_token', data.token);
                    localStorage.setItem('user_info', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.error || '登录失败';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                errorMsg.textContent = '网络错误，请重试';
                errorMsg.style.display = 'block';
            }
        });
        
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error === 'auth_failed') {
            errorMsg.textContent = 'GitHub 授权失败，请重试';
            errorMsg.style.display = 'block';
        } else if (error === 'not_registered') {
            errorMsg.textContent = '该 GitHub 账号未注册，请先注册';
            errorMsg.style.display = 'block';
        } else if (error === 'not_found') {
            errorMsg.textContent = '用户不存在，请先注册';
            errorMsg.style.display = 'block';
        }
    </script>
</body>
</html>
