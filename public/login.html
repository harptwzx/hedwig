<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · Hedwig</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .login-card {
            max-width: 400px;
            margin: 3rem auto;
            text-align: center;
        }
        .github-login {
            background: #24292e;
            color: white;
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 0.25rem;
            text-decoration: none;
            font-weight: 500;
            margin-top: 1rem;
        }
        .github-login:hover {
            background: #2c3136;
        }
        .guest-link {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #334155;
        }
        .guest-link a {
            color: #94a3b8;
            text-decoration: none;
        }
        .guest-link a:hover {
            color: #fbbf24;
        }
        .info {
            background: #1e293b;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>
    
    <div class="container">
        <div class="login-card card">
            <h2>登录</h2>
            <div class="info">
                使用 GitHub 账号登录
            </div>
            <a href="#" class="github-login" id="githubLoginBtn">
                使用 GitHub 登录
            </a>
            <div class="guest-link">
                <a href="/">继续以访客身份浏览</a>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script>
        const WORKER_URL = '';
        
        document.getElementById('githubLoginBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            window.location.href = `${WORKER_URL}/auth/login?redirect=${encodeURIComponent(window.location.origin)}`;
        });
        
        Hedwig.initPage().then(() => {
            if (Hedwig.isLoggedIn()) {
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>
