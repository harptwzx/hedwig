<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · Hedwig</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .login-card {
            max-width: 400px;
            margin: 3rem auto;
            text-align: center;
        }
        .github-login {
            background: #24292e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            text-decoration: none;
            font-weight: 500;
            margin-top: 1rem;
            cursor: pointer;
            border: none;
            width: 100%;
            font-size: 1rem;
        }
        .github-login:hover {
            background: #2c3136;
        }
        .divider {
            margin: 1.5rem 0;
            position: relative;
            text-align: center;
        }
        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #334155;
        }
        .divider span {
            position: relative;
            background: #0f172a;
            padding: 0 0.75rem;
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .register-link {
            margin-top: 1.5rem;
            color: #94a3b8;
        }
        .register-link a {
            color: #fbbf24;
            text-decoration: none;
        }
        .error-msg {
            background: #7f1a1a;
            color: #fecaca;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }
        .info {
            background: #1e293b;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="container">
        <div class="login-card card">
            <h2>登录 Hedwig</h2>
            <div class="info">
                使用 GitHub 账号一键登录
            </div>
            <div id="errorMsg" class="error-msg"></div>
            
            <a href="/auth/github" class="github-login">
                <svg height="20" viewBox="0 0 16 16" width="20" style="fill:white;">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path>
                </svg>
                使用 GitHub 登录
            </a>
            
            <div class="divider">
                <span>其他方式</span>
            </div>
            
            <div class="register-link">
                新用户？首次登录会自动创建账号
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script>
        // 检查 URL 参数中的错误
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error === 'github_auth_failed') {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = 'GitHub 授权失败，请重试';
            errorMsg.style.display = 'block';
        }
        
        // 检查是否已登录
        Hedwig.initPage().then(() => {
            if (Hedwig.isLoggedIn()) {
                window.location.href = '/';
            }
        });
    </script>
</body>
</html>
