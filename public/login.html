<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · Hedwig</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .card { max-width: 400px; margin: 50px auto; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #fbbf24; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        .github-btn { background: #24292e; color: white; display: inline-block; margin-top: 20px; padding: 10px 20px; text-decoration: none; border-radius: 5px; }
        .msg { margin-top: 20px; padding: 10px; border-radius: 5px; }
        .error { background: #7f1a1a; color: #fecaca; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>登录</h2>
            <div id="msg" class="msg" style="display:none"></div>
            <input type="text" id="username" placeholder="用户名">
            <input type="password" id="password" placeholder="密码">
            <button id="loginBtn">登录</button>
            <hr>
            <a href="/auth/login" class="github-btn">使用 GitHub 登录</a>
            <p>没有账号？<a href="/register.html">立即注册</a></p>
        </div>
    </div>
    <script src="/js/common.js"></script>
    <script>
        const msgDiv = document.getElementById('msg');
        function showMsg(text) {
            msgDiv.textContent = text;
            msgDiv.className = 'msg error';
            msgDiv.style.display = 'block';
        }
        document.getElementById('loginBtn').onclick = async () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) return showMsg('用户名和密码不能为空');
            const resp = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await resp.json();
            if (resp.ok) {
                localStorage.setItem('auth_token', data.token);
                localStorage.setItem('user_info', JSON.stringify(data.user));
                window.location.href = '/';
            } else {
                showMsg(data.error || '登录失败');
            }
        };
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error === 'not_registered') showMsg('该GitHub账号未注册，请先注册');
        else if (error === 'auth_failed') showMsg('GitHub授权失败，请重试');
    </script>
</body>
</html>
