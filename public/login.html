<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · Hedwig</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .login-card {
            max-width: 400px;
            margin: 3rem auto;
            text-align: center;
        }
        .github-login {
            background: #24292e;
            color: white;
            display: inline-block;
            padding: 0.75rem 1.5rem;
            border-radius: 0.25rem;
            font-weight: 500;
            margin-top: 1rem;
            cursor: pointer;
            border: none;
            font-size: 1rem;
            text-decoration: none;
        }
        .github-login:hover {
            background: #2c3136;
        }
        .guest-link {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #334155;
        }
        .guest-link a {
            color: #94a3b8;
            text-decoration: none;
        }
        .guest-link a:hover {
            color: #fbbf24;
        }
        .info {
            background: #1e293b;
            padding: 1rem;
            border-radius: 0.5rem;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        .error-msg {
            background: #7f1a1a;
            color: #fecaca;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }
        .success-msg {
            background: #1a4731;
            color: #86efac;
            padding: 0.75rem;
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <div class="container">
        <div class="login-card card">
            <h2>登录</h2>
            <div class="info">
                使用 GitHub 账号登录
            </div>
            <div id="errorMsg" class="error-msg"></div>
            <div id="successMsg" class="success-msg"></div>
            <a href="#" class="github-login" id="githubLoginBtn">
                使用 GitHub 登录
            </a>
            <div class="guest-link">
                <a href="/">继续以访客身份浏览</a>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script>
        const loginBtn = document.getElementById('githubLoginBtn');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        // ✅ 关键：登录按钮 -> 相对路径（不写死任何域名）
        loginBtn.addEventListener('click', (e) => {
            e.preventDefault();
            // 直接指向相对路径的 Worker 路由
            // 最终会被 Pages 代理到 Worker
            window.location.href = '/auth/login';
        });

        // 页面初始化：检查登录状态
        Hedwig.initPage().then(() => {
            if (Hedwig.isLoggedIn()) {
                // 已登录：直接回首页
                window.location.href = '/';
                return;
            }

            // 检查 URL 参数
            const params = new URLSearchParams(window.location.search);
            if (params.get('error') === 'failed') {
                errorMsg.textContent = 'GitHub 授权失败，请重试';
                errorMsg.style.display = 'block';
            } else if (params.get('success') === 'true') {
                successMsg.textContent = '登录成功，正在跳转...';
                successMsg.style.display = 'block';
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            }
        });
    </script>
</body>
</html>
