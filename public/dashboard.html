<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制台 - Hedwig</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav>
        <div class="logo"><a href="/">Hedwig</a></div>
        <div id="navLinks"></div>
    </nav>

    <main>
        <h1>欢迎回来，<span id="username"></span>！</h1>
        <p>这里是你的个人控制台</p>

        <div class="dashboard-sections">
            <div class="section-card">
                <div class="section-header">
                    <h2>我的游戏</h2>
                    <span class="section-desc">点击游戏名称开始游玩</span>
                </div>
                <div id="gameList" class="game-list">
                    <div class="loading">加载游戏列表...</div>
                </div>
            </div>

            <div class="section-card">
                <div class="section-header">
                    <h2>修改密码</h2>
                </div>
                <form id="changePasswordForm" class="password-form">
                    <div class="form-group">
                        <label for="oldPassword">当前密码</label>
                        <input type="password" id="oldPassword" required>
                    </div>
                    <div class="form-group">
                        <label for="newPassword">新密码</label>
                        <input type="password" id="newPassword" required minlength="6">
                        <small>密码长度至少6位</small>
                    </div>
                    <div class="form-group">
                        <label for="confirmNewPassword">确认新密码</label>
                        <input type="password" id="confirmNewPassword" required>
                    </div>
                    <button type="submit" class="btn-primary">修改密码</button>
                </form>
                <div id="passwordMessage" class="message" style="display:none;"></div>
            </div>
        </div>
    </main>

    <script src="/js/app.js"></script>
</body>
</html>
