<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制台 · Hedwig</title>
    <link rel="stylesheet" href="/css/common.css">
    <style>
        .dashboard-card {
            margin-bottom: 1.5rem;
        }
        .stats {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .stat-item {
            background: #1e293b;
            padding: 1rem;
            border-radius: 0.5rem;
            flex: 1;
            text-align: center;
            min-width: 100px;
        }
        .stat-number {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fbbf24;
        }
        .stat-label {
            font-size: 0.8rem;
            color: #94a3b8;
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>
    
    <div class="container">
        <div class="welcome">
            <h1>魔法师控制台</h1>
            <p>欢迎回来，<span id="username"></span></p>
            <span id="user-badge" class="badge"></span>
        </div>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-number">0</div>
                <div class="stat-label">魔法日记</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">0</div>
                <div class="stat-label">发布帖子</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">0</div>
                <div class="stat-label">获得赞许</div>
            </div>
        </div>
        
        <div class="card dashboard-card">
            <h3>最近动态</h3>
            <p style="color: #94a3b8;">暂无动态，写一篇魔法日记吧。</p>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script>
        Hedwig.initPage().then(() => {
            if (!Hedwig.requireAuth()) {
                return;
            }
            
            const user = Hedwig.getUser();
            if (user) {
                document.getElementById('username').textContent = user.login;
            }
        });
    </script>
</body>
</html>
