<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制台 - Hedwig</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="app">
        <nav class="navbar">
            <div class="nav-container">
                <a href="/" class="logo">Hedwig</a>
                <div class="nav-links" id="navLinks"></div>
            </div>
        </nav>
        
        <main class="container">
            <!-- 调试信息区域 - 显示登录状态和API返回内容 -->
            <div id="debug-info" style="background:#1a1a2e; color:#0f0; padding:12px; margin-bottom:20px; border-radius:5px; font-family:monospace; font-size:12px; white-space:pre-wrap; word-break:break-all; border:1px solid #00ff00;">
                <strong>调试信息 (Debug Info):</strong><br>
                等待加载...
            </div>
            
            <div class="dashboard">
                <div class="welcome-card">
                    <h2>欢迎回来，<span id="username"></span>！</h2>
                    <p>这里是你的魔法控制台</p>
                </div>
                
                <div class="dashboard-grid">
                    <div class="dashboard-card">
                        <h3>魔法日记</h3>
                        <p>记录你的魔法时刻</p>
                    </div>
                    
                    <div class="dashboard-card">
                        <h3>我的书库</h3>
                        <p>管理你的收藏</p>
                    </div>
                    
                    <div class="dashboard-card">
                        <h3>咒语集</h3>
                        <p>收集强大的咒语</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="/js/app.js"></script>
</body>
</html>
