<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>控制台 - Hedwig</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

        <div class="logo"><a href="/">🦉 Hedwig</a></div>
        <div id="navLinks"></div>
    </nav>

    <main>

        <div class="features">

                <div class="feature-icon">📓</div>

            </div>
            <div class="feature">
                <div class="feature-icon">📚</div>
                <h3>书库</h3>
                <p>管理你的收藏</p>
            </div>
            <div class="feature">
                <div class="feature-icon">⭐</div>
                <h3>收藏</h3>
                <p>收集喜欢的事物</p>
            </div>
        </div>

    <script src="/js/app.js"></script>

</html>
