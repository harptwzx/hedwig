<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>自建代理</title>
<style>
    body { font-family: sans-serif; padding: 20px; }
    input { padding: 10px; width: 400px; }
    button { padding: 10px 15px; cursor: pointer; }
    iframe { width: 100%; height: 600px; border: 1px solid #ccc; margin-top: 20px; }
</style>
</head>
<body>
    <h3>输入网址并访问（通过手机住宅IP）</h3>
    <input type="text" id="urlInput" placeholder="输入网址，例如 https://www.google.com">
    <button onclick="visit()">访问</button>
    <br><br>
    <iframe id="webFrame" src="about:blank"></iframe>

    <script>
        // ⚠️ 把下面这行替换成你的 Cloudflared 隧道地址 ⚠️
        const PROXY_HOST = "https://xxxx.trycloudflare.com";
        
        function visit() {
            var rawUrl = document.getElementById('urlInput').value.trim();
            if (!rawUrl) return;
            if (!rawUrl.startsWith('http')) rawUrl = 'https://' + rawUrl;
            
            // 通过手机代理加载目标网站
            var proxyUrl = PROXY_HOST + '/proxy?url=' + encodeURIComponent(rawUrl);
            document.getElementById('webFrame').src = proxyUrl;
        }
    </script>
</body>
</html>
