<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>跳转</title>
</head>
<body>
    <script>
        var u = new URLSearchParams(window.location.search).get('url');
        if (u) { window.location.href = u; }
        else { document.body.innerHTML = '请使用 ?url=网址'; }
    </script>
</body>
</html>
