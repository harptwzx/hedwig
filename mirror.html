<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>通用镜像加速</title>
    <style>
        body { margin: 0; padding: 0; }
        iframe { width: 100%; height: 100vh; border: none; }
    </style>
</head>
<body>
    <iframe id="mirrorFrame" src=""></iframe>
    <script>
        // ⚠️ 换成你的隧道地址 ⚠️
        const PROXY_HOST = "https://你的隧道地址.trycloudflare.com";
        
        // 从 URL 参数获取目标网站
        const params = new URLSearchParams(window.location.search);
        const targetUrl = params.get('url');
        
        if (targetUrl) {
            const proxyUrl = PROXY_HOST + '/proxy?url=' + encodeURIComponent(targetUrl);
            document.getElementById('mirrorFrame').src = proxyUrl;
        } else {
            document.body.innerHTML = '<h2>请使用 ?url=目标网址 参数访问</h2>';
        }
    </script>
</body>
</html>
